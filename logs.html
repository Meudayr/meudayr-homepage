<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>Raid Logs - Meudayr</title>
  <meta name="description" content="Latest WarcraftLogs raid reports from Meudayr. Quick links to recent raid logs for guildmates.">
  <meta name="author" content="Meudayr">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo.png">

  <style>
    .logs-header {
      text-align: center;
      padding: 60px 0 40px;
    }

    .logs-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .logs-header p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .last-updated {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--text-dark);
    }

    .last-updated .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Log cards grid */
    .logs-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 80px;
    }

    .log-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .log-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .log-card:hover {
      border-color: var(--card-border-hover);
      transform: translateX(4px);
    }

    .log-card:hover::before {
      opacity: 1;
    }

    .log-card:hover .log-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Date badge */
    .log-date-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1c1e24;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      min-width: 58px;
      text-align: center;
      flex-shrink: 0;
    }

    .log-date-day {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text-main);
    }

    .log-date-month {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dark);
      margin-top: 2px;
    }

    /* Log info */
    .log-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .log-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .log-zone {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
    }

    .log-duration {
      font-size: 0.82rem;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .log-duration svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      flex-shrink: 0;
    }

    /* Arrow */
    .log-arrow {
      color: var(--text-muted);
      opacity: 0;
      transform: translateX(-6px);
      transition: var(--transition);
      flex-shrink: 0;
    }

    .log-arrow svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
    }

    /* Latest badge on first card */
    .log-card.latest .log-date-badge {
      border-color: rgba(56, 142, 60, 0.4);
      background: rgba(56, 142, 60, 0.07);
    }

    .latest-tag {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(56, 142, 60, 0.15);
      border: 1px solid rgba(56, 142, 60, 0.3);
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Loading / Error / Empty states */
    .state-box {
      text-align: center;
      padding: 80px 20px;
      background: var(--card-bg);
      border: 1px dashed var(--card-border);
      border-radius: var(--radius-lg);
      margin-bottom: 80px;
    }

    .state-box svg {
      width: 48px;
      height: 48px;
      stroke: currentColor;
      fill: none;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .state-box p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .state-box .state-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .skeleton {
      animation: shimmer 1.5s infinite;
      background: linear-gradient(90deg, var(--card-bg) 25%, #1f2229 50%, var(--card-bg) 75%);
      background-size: 200% 100%;
      border-radius: var(--radius-md);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      height: 86px;
      border-radius: var(--radius-lg);
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px 0 60px;
    }

    .page-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--card-border-hover);
      color: var(--text-main);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
    }

    .page-info {
      font-size: 0.85rem;
      color: var(--text-dark);
      min-width: 90px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Header Navigation -->
  <header>
    <div class="container nav-container">
      <a href="index.html" class="brand" id="nav-brand-link">
        <img src="assets/logo.png" alt="Meudayr Logo" id="nav-brand-logo">
        <span>Meudayr</span>
      </a>
      <div class="nav-group">
        <nav class="nav-menu">
          <a href="index.html" class="nav-link" id="nav-home-link">Home</a>
          <a href="dr.html" class="nav-link" id="nav-dr-link">DR Calculator</a>
          <a href="logs.html" class="nav-link active" id="nav-logs-link">Logs</a>
        </nav>
        <div class="social-links">
          <a href="https://plex.meudayr.com" class="social-icon plex-nav-icon" target="_blank" rel="noopener noreferrer" aria-label="Plex Server Status" id="nav-plex-link" title="Plex Server Status: Checking...">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
            <span class="plex-nav-dot" id="plex-nav-dot"></span>
          </a>
          <a href="https://github.com/Meudayr" class="social-icon" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile" id="nav-github-link">
            <svg viewBox="0 0 24 24"><path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="logs-header">
      <div class="badge">WarcraftLogs</div>
      <h1>Raid Logs</h1>
      <p>Recent raid reports from Meudayr. Click any log to view the full breakdown on WarcraftLogs.</p>
      <div class="last-updated" id="last-updated-text" style="display:none;">
        <span class="dot"></span>
        <span id="updated-timestamp"></span>
      </div>
    </section>

    <!-- Log cards will be rendered here -->
    <div id="logs-container">
      <!-- Skeleton loading state -->
      <div class="logs-grid" id="skeleton-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
    <!-- Pagination controls -->
    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn" id="btn-prev" onclick="changePage(-1)" disabled>
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        Prev
      </button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="btn-next" onclick="changePage(1)">
        Next
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
      </button>
    </div>
  </main>

  <footer style="margin-top: auto; padding: 40px 0; border-top: 1px solid var(--card-border); text-align: center; color: var(--text-dark); font-size: 0.85rem;">
    <div class="container">
      <p>Logs are fetched from <a href="https://www.warcraftlogs.com/character/us/crushridge/meudayr" target="_blank" style="color: var(--text-muted); text-decoration: none;">WarcraftLogs</a> and updated automatically every 4 hours.</p>
    </div>
  </footer>

  <script>
    const PAGE_SIZE = 15;
    let allReports = [];
    let currentPage = 1;

    function buildCard(report, isFirst) {
      const date = new Date(report.startTime);
      const durationMs = report.endTime - report.startTime;
      const durationMins = Math.round(durationMs / 60000);
      const hours = Math.floor(durationMins / 60);
      const mins = durationMins % 60;
      const durationStr = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
      const day = date.toLocaleDateString('en-US', { day: '2-digit' });
      const month = date.toLocaleDateString('en-US', { month: 'short' });

      const card = document.createElement('a');
      card.className = 'log-card' + (isFirst ? ' latest' : '');
      card.href = `https://www.warcraftlogs.com/reports/${report.code}`;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = `
        <div class="log-date-badge">
          <div class="log-date-day">${day}</div>
          <div class="log-date-month">${month}</div>
        </div>
        <div class="log-info">
          <div class="log-title">
            ${isFirst ? '<span class="latest-tag">Latest</span> ' : ''}${report.title || 'Raid Night'}
          </div>
          <div class="log-meta">
            ${report.zone ? `<span class="log-zone">${report.zone.name}</span>` : ''}
            <span class="log-duration">
              <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${durationStr}
            </span>
          </div>
        </div>
        <div class="log-arrow">
          <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </div>`;
      return card;
    }

    function renderPage(page, scroll = false) {
      const container = document.getElementById('logs-container');
      const totalPages = Math.ceil(allReports.length / PAGE_SIZE);
      const start = (page - 1) * PAGE_SIZE;
      const pageReports = allReports.slice(start, start + PAGE_SIZE);

      const grid = document.createElement('div');
      grid.className = 'logs-grid';
      pageReports.forEach((report, i) => {
        grid.appendChild(buildCard(report, page === 1 && i === 0));
      });

      container.innerHTML = '';
      container.appendChild(grid);

      // Update pagination controls
      document.getElementById('btn-prev').disabled = page <= 1;
      document.getElementById('btn-next').disabled = page >= totalPages;
      document.getElementById('page-info').textContent = `Page ${page} of ${totalPages}`;

      // Only scroll when navigating pages, not on initial load
      if (scroll) {
        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function changePage(delta) {
      const totalPages = Math.ceil(allReports.length / PAGE_SIZE);
      currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
      renderPage(currentPage, true);
    }

    async function loadLogs() {
      const container = document.getElementById('logs-container');
      const skeletonGrid = document.getElementById('skeleton-grid');

      try {
        const response = await fetch('data/logs.json?t=' + Date.now());
        if (!response.ok) throw new Error('Failed to fetch logs data.');
        const data = await response.json();

        skeletonGrid.remove();

        if (!data.reports || data.reports.length === 0) {
          container.innerHTML = `
            <div class="state-box">
              <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
              <div class="state-title">No Logs Found</div>
              <p>No public raid logs found yet. Check back after the next raid night!</p>
            </div>`;
          return;
        }

        // Show last updated timestamp
        if (data.fetchedAt) {
          const ts = new Date(data.fetchedAt);
          const formatted = ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
            ' at ' + ts.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          document.getElementById('updated-timestamp').textContent = 'Updated ' + formatted;
          document.getElementById('last-updated-text').style.display = 'inline-flex';
        }

        allReports = data.reports;
        currentPage = 1;
        renderPage(1);

        // Show pagination only if more than one page
        if (allReports.length > PAGE_SIZE) {
          document.getElementById('pagination').style.display = 'flex';
        }

      } catch (err) {
        skeletonGrid.remove();
        container.innerHTML = `
          <div class="state-box">
            <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
            <div class="state-title">Could not load logs</div>
            <p>The log data hasn't been fetched yet, or there was a connection error. Try refreshing in a few minutes.</p>
          </div>`;
      }
    }

    // Live Plex Status Checker
    async function checkPlexStatus() {
      const iconLink = document.getElementById('nav-plex-link');
      const dot = document.getElementById('plex-nav-dot');
      if (!dot) return;

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 4000);

      try {
        await fetch('https://plex.meudayr.com/identity', {
          method: 'GET',
          mode: 'no-cors',
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        dot.className = 'plex-nav-dot online';
        if (iconLink) iconLink.setAttribute('title', 'Plex Server Status: Online');
      } catch (err) {
        clearTimeout(timeoutId);
        dot.className = 'plex-nav-dot offline';
        if (iconLink) iconLink.setAttribute('title', 'Plex Server Status: Offline');
      }
    }

    loadLogs();
    checkPlexStatus();
  </script>

</body>
</html>
