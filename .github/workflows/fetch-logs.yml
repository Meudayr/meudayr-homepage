name: Fetch WarcraftLogs

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours automatically
  workflow_dispatch:          # Allows you to trigger it manually from GitHub

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to push data/logs.json back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Logs from WarcraftLogs
        run: node scripts/fetch-logs.js
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}

      - name: Commit and Push logs.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/logs.json
          if git diff --staged --quiet; then
            echo "No changes to logs.json, skipping commit."
          else
            git commit -m "chore: update logs.json"
            git push
          fi
